<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SafarGate — Application-readiness copilot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Noto+Naskh+Arabic:wght@400;500;600;700&family=Noto+Sans+Arabic:wght@400;500;600;700&family=Noto+Nastaliq+Urdu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ============ TOKENS ============ */
:root{
  --paper:#F7F3EC;
  --paper-2:#EDE7D9;
  --ink:#1C2B3A;
  --ink-soft:#4B5A68;
  --teal:#0F7A6E;
  --teal-ink:#08433D;
  --teal-bg:#E1F1EE;
  --amber:#C98A2C;
  --amber-bg:#FBEEDA;
  --coral:#C0523F;
  --coral-bg:#FBE7E2;
  --line:#D8CFBC;
  --line-strong:#B9AF98;
  --white:#FFFDF8;
  --radius:14px;
  --radius-sm:8px;
  --shadow:0 1px 2px rgba(28,43,58,.04), 0 8px 24px rgba(28,43,58,.06);
  --font-display:'Fraunces', serif;
  --font-body:'Inter', sans-serif;
  --font-mono:'IBM Plex Mono', monospace;
  --dur:220ms;
  --ease:cubic-bezier(.22,1,.36,1);
}
html[lang="ar"]{
  --font-display:'Noto Naskh Arabic','Inter',sans-serif;
  --font-body:'Noto Sans Arabic','Inter',sans-serif;
}
html[lang="ur"]{
  --font-display:'Noto Nastaliq Urdu','Inter',sans-serif;
  --font-body:'Noto Nastaliq Urdu','Inter',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:
    radial-gradient(1200px 500px at 15% -10%, #FBF8F1 0%, transparent 60%),
    var(--paper);
  color:var(--ink);
  font-family:var(--font-body);
  font-size:16px;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
  min-height:100vh;
}
html[lang="ur"] body{ font-size:17px; line-height:1.9; }
html[lang="ar"] body{ line-height:1.75; }

h1,h2,h3{ font-family:var(--font-display); color:var(--ink); margin:0; letter-spacing:-.01em;}
button{ font-family:inherit; }
.mono{ font-family:var(--font-mono); font-variant-numeric:tabular-nums; direction:ltr; unicode-bidi:isolate; }

/* ============ FOCUS / A11Y ============ */
:focus{ outline:none; }
:focus-visible{
  outline:2px solid var(--teal);
  outline-offset:2px;
  border-radius:6px;
}
.skip-link{
  position:absolute; top:-48px; inset-inline-start:8px;
  background:var(--ink); color:var(--white); padding:10px 16px;
  border-radius:8px; z-index:200; transition:top var(--dur) var(--ease);
  text-decoration:none; font-weight:600;
}
.skip-link:focus{ top:8px; }
.visually-hidden{
  position:absolute!important; width:1px;height:1px; padding:0;margin:-1px;
  overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
}

/* ============ LAYOUT SHELL ============ */
.shell{ max-width:1180px; margin:0 auto; padding:0 20px 80px; }
header.top{
  display:flex; align-items:center; justify-content:space-between;
  padding:22px 0 8px; gap:16px; flex-wrap:wrap;
}
.brand{ display:flex; align-items:center; gap:10px; }
.brand-mark{
  width:38px; height:38px; border-radius:10px;
  background:var(--ink); display:flex; align-items:center; justify-content:center;
  color:var(--paper); flex:none;
}
.brand-name{ font-family:var(--font-display); font-weight:600; font-size:1.28rem; }
.brand-sub{ font-size:.72rem; color:var(--ink-soft); letter-spacing:.04em; text-transform:uppercase; }

.top-controls{ display:flex; align-items:center; gap:10px; }
.lang-switch{ display:flex; background:var(--paper-2); border:1px solid var(--line); border-radius:999px; padding:3px; gap:2px; }
.lang-btn{
  border:none; background:transparent; padding:7px 12px; border-radius:999px;
  font-size:.82rem; font-weight:600; color:var(--ink-soft); cursor:pointer;
  transition:background var(--dur) var(--ease), color var(--dur) var(--ease);
}
.lang-btn[aria-pressed="true"]{ background:var(--ink); color:var(--white); }
.lang-btn:hover:not([aria-pressed="true"]){ background:#E4DDCA; }

.shield-btn{
  display:flex; align-items:center; gap:7px; border:1px solid var(--line-strong);
  background:var(--white); padding:8px 14px; border-radius:999px; cursor:pointer;
  font-size:.82rem; font-weight:600; color:var(--ink);
  box-shadow:var(--shadow);
}
.shield-btn:hover{ border-color:var(--teal); }

/* ============ PROGRESS RAIL (signature element) ============ */
.rail{
  display:flex; margin:26px 0 34px; position:relative; gap:0;
}
.stub{
  flex:1; position:relative; background:var(--white);
  border:1.5px solid var(--line); padding:16px 20px 16px 22px;
  cursor:pointer; text-align:start; display:flex; flex-direction:column; gap:6px;
  transition:border-color var(--dur) var(--ease), background var(--dur) var(--ease), transform var(--dur) var(--ease);
}
.stub:first-child{ border-start-start-radius:var(--radius); border-end-start-radius:var(--radius); }
.stub:last-child{ border-start-end-radius:var(--radius); border-end-end-radius:var(--radius); }
.stub + .stub{ border-inline-start:none; }
.stub::after{
  /* perforation notch */
  content:""; position:absolute; inset-inline-end:-9px; top:50%; transform:translateY(-50%);
  width:18px; height:18px; border-radius:50%; background:var(--paper);
  border:1.5px solid var(--line); z-index:2;
}
.stub:last-child::after{ display:none; }
.stub-row{ display:flex; align-items:center; gap:9px; }
.stub-num{
  width:24px; height:24px; border-radius:50%; border:1.5px solid var(--line-strong);
  display:flex; align-items:center; justify-content:center; font-size:.72rem; font-weight:700;
  color:var(--ink-soft); flex:none; font-family:var(--font-mono);
}
.stub-label{ font-weight:600; font-size:.95rem; }
.stub-desc{ font-size:.76rem; color:var(--ink-soft); margin-inline-start:33px; }
.stub[aria-current="step"]{ background:var(--teal-bg); border-color:var(--teal); z-index:3; transform:translateY(-2px); }
.stub[aria-current="step"] .stub-num{ background:var(--teal); border-color:var(--teal); color:var(--white); }
.stub[data-done="true"] .stub-num{ background:var(--ink); border-color:var(--ink); color:var(--white); }
.stub[data-done="true"] .stub-num::before{ content:"✓"; }
.plane{
  position:absolute; top:-13px; font-size:16px; transition:inset-inline-start var(--dur) var(--ease);
  filter:drop-shadow(0 2px 3px rgba(0,0,0,.15));
}
html[dir="rtl"] .plane{ transform:scaleX(-1); }

/* ============ CARDS / SECTIONS ============ */
.panel{
  background:var(--white); border:1px solid var(--line); border-radius:var(--radius);
  box-shadow:var(--shadow); padding:26px; margin-bottom:20px;
}
.eyebrow{
  font-size:.72rem; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  color:var(--teal-ink); margin-bottom:6px;
}
html[lang="ar"] .eyebrow, html[lang="ur"] .eyebrow{ letter-spacing:0; }
.step-h1{ font-size:1.7rem; margin-bottom:6px; }
.step-intro{ color:var(--ink-soft); max-width:60ch; margin-bottom:22px; }

.grid-2{ display:grid; grid-template-columns:1fr 1fr; gap:24px; align-items:start; }
@media (max-width:860px){ .grid-2{ grid-template-columns:1fr; } }

/* upload zone */
.upload-note{
  display:flex; gap:10px; background:var(--teal-bg); border:1px solid #BFE0D9;
  border-radius:var(--radius-sm); padding:12px 14px; font-size:.86rem; color:var(--teal-ink);
  margin-bottom:16px; align-items:flex-start;
}
.upload-note svg{ flex:none; margin-top:2px; }
.dropzone{
  border:2px dashed var(--line-strong); border-radius:var(--radius);
  padding:26px 18px; text-align:center; background:var(--paper-2);
  cursor:pointer; transition:border-color var(--dur), background var(--dur);
}
.dropzone:hover, .dropzone:focus-visible{ border-color:var(--teal); background:var(--teal-bg); }
.dropzone .dz-title{ font-weight:600; margin-bottom:4px; }
.dropzone .dz-sub{ font-size:.82rem; color:var(--ink-soft); }
.dz-actions{ display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }

.btn{
  border:none; border-radius:999px; padding:11px 20px; font-weight:600; font-size:.88rem;
  cursor:pointer; display:inline-flex; align-items:center; gap:8px;
  transition:transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease), background var(--dur);
}
.btn:active{ transform:scale(.97); }
.btn-primary{ background:var(--ink); color:var(--white); }
.btn-primary:hover{ box-shadow:0 6px 16px rgba(28,43,58,.25); }
.btn-secondary{ background:var(--white); color:var(--ink); border:1.5px solid var(--line-strong); }
.btn-secondary:hover{ border-color:var(--ink); }
.btn-teal{ background:var(--teal); color:var(--white); }
.btn-teal:hover{ box-shadow:0 6px 16px rgba(15,122,110,.28); }
.btn-danger{ background:var(--white); color:var(--coral); border:1.5px solid var(--coral); }
.btn-danger:hover{ background:var(--coral); color:var(--white); }
.btn:disabled{ opacity:.45; cursor:not-allowed; }
.btn-sm{ padding:7px 14px; font-size:.78rem; }

/* processing state */
.processing{ display:flex; align-items:center; gap:12px; padding:20px; }
.spinner{
  width:22px; height:22px; border-radius:50%;
  border:3px solid var(--line); border-top-color:var(--teal);
  animation:spin .8s linear infinite; flex:none;
}
@keyframes spin{ to{ transform:rotate(360deg);} }
.processing-text{ font-size:.9rem; color:var(--ink-soft); }
.processing-text strong{ color:var(--ink); }

/* document + field split */
.doc-frame{
  background:var(--paper-2); border:1px solid var(--line); border-radius:var(--radius);
  padding:18px; position:relative; min-height:360px;
}
.doc-paper{
  background:var(--white); border-radius:8px; box-shadow:0 4px 14px rgba(28,43,58,.08);
  padding:22px; font-size:.78rem; color:var(--ink-soft); position:relative;
}
.doc-line{ height:9px; background:#EDE9DC; border-radius:3px; margin-bottom:9px; width:100%; }
.doc-hl{
  position:relative; display:inline-block; padding:2px 6px; border-radius:4px; font-weight:600; color:var(--ink);
  font-family:var(--font-mono);
}
.doc-hl[data-c="confident"]{ background:#CDEDE4; box-shadow:inset 0 0 0 1.5px var(--teal); }
.doc-hl[data-c="check"]{ background:#F6DFB1; box-shadow:inset 0 0 0 1.5px var(--amber); }
.doc-hl[data-c="missing"]{ background:#F5D2C8; box-shadow:inset 0 0 0 1.5px var(--coral); border-style:dashed; }

.fields{ display:flex; flex-direction:column; gap:14px; }
.field{
  border:1.5px solid var(--line); border-radius:var(--radius); padding:14px 16px;
  background:var(--white); transition:border-color var(--dur);
}
.field[data-confirmed="true"]{ border-color:var(--teal); background:var(--teal-bg); }
.field-top{ display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
.field-label-row{ display:flex; align-items:center; gap:6px; }
.field-label{ font-weight:600; font-size:.9rem; }
.help-btn{
  width:18px; height:18px; border-radius:50%; border:1px solid var(--line-strong); background:var(--white);
  font-size:.68rem; font-weight:700; color:var(--ink-soft); cursor:pointer; line-height:1; padding:0;
  display:flex; align-items:center; justify-content:center; flex:none;
}
.help-btn:hover{ border-color:var(--teal); color:var(--teal); }
.field-help{
  font-size:.78rem; color:var(--ink-soft); background:var(--paper-2); border-radius:8px; padding:8px 10px;
  margin:6px 0 4px;
}
.tag{
  font-size:.72rem; font-weight:700; padding:4px 10px; border-radius:999px; display:inline-flex; align-items:center; gap:5px;
}
.tag[data-c="confident"]{ background:var(--teal-bg); color:var(--teal-ink); }
.tag[data-c="check"]{ background:var(--amber-bg); color:#7A5314; }
.tag[data-c="missing"]{ background:var(--coral-bg); color:#7C3323; }
.field-value{
  font-size:1.05rem; font-weight:600; margin-bottom:10px; display:block;
}
.field-input{
  width:100%; padding:9px 11px; border:1.5px solid var(--line-strong); border-radius:8px;
  font-family:var(--font-mono); font-size:.95rem; background:var(--white); color:var(--ink);
}
.field-input:focus-visible{ border-color:var(--teal); }
.field-actions{ display:flex; gap:8px; margin-top:10px; }
.field-status-line{ font-size:.74rem; color:var(--ink-soft); margin-top:8px; display:flex; align-items:center; gap:5px;}

/* Q&A step */
.chip-row{ display:flex; gap:8px; flex-wrap:wrap; margin:12px 0 18px; }
.chip{
  border:1.5px solid var(--line-strong); background:var(--white); border-radius:999px;
  padding:8px 14px; font-size:.82rem; cursor:pointer; color:var(--ink);
}
.chip:hover{ border-color:var(--teal); color:var(--teal-ink); }
.ask-row{ display:flex; gap:10px; margin-bottom:8px; }
.ask-input{
  flex:1; padding:13px 16px; border:1.5px solid var(--line-strong); border-radius:999px;
  font-size:.95rem; background:var(--white); color:var(--ink);
}
.ask-input:focus-visible{ border-color:var(--teal); }

.answer-card{ border-radius:var(--radius); padding:20px 22px; margin-top:18px; border:1.5px solid; animation:rise var(--dur) var(--ease); }
@keyframes rise{ from{ opacity:0; transform:translateY(6px);} to{ opacity:1; transform:translateY(0);} }
.answer-card.evidence{ border-color:var(--teal); background:linear-gradient(180deg,var(--teal-bg),var(--white) 70%); }
.answer-card.warn{ border-color:var(--amber); background:linear-gradient(180deg,var(--amber-bg),var(--white) 70%); }
.answer-row{ display:flex; justify-content:space-between; padding:9px 0; border-bottom:1px dashed var(--line); font-size:.9rem; gap:14px; }
.answer-row:last-of-type{ border-bottom:none; }
.answer-row .k{ color:var(--ink-soft); }
.answer-row .v{ font-weight:600; text-align:end; }
.comparison-line{
  font-family:var(--font-display); font-size:1.15rem; font-weight:600; margin:12px 0; color:var(--teal-ink);
}
.answer-card.warn .comparison-line{ color:#7A5314; }
.source-line{
  display:flex; align-items:center; gap:8px; font-size:.8rem; color:var(--ink-soft); margin-top:10px;
  padding-top:10px; border-top:1px solid var(--line);
}
.source-link{ color:var(--teal-ink); font-weight:600; text-decoration:underline; cursor:pointer; background:none; border:none; padding:0; font-size:inherit; font-family:inherit;}
.fix-link{ color:#7A5314; font-weight:700; text-decoration:underline; cursor:pointer; background:none; border:none; padding:0; font-family:inherit; font-size:inherit;}
.qa-log{ display:flex; flex-direction:column; gap:16px; margin-top:6px; }
.q-bubble{ align-self:flex-end; background:var(--ink); color:var(--white); padding:10px 16px; border-radius:16px 16px 4px 16px; max-width:75%; font-size:.9rem;}
html[dir="rtl"] .q-bubble{ align-self:flex-start; border-radius:16px 16px 16px 4px; }

/* checklist / prepare */
.checklist{ display:flex; flex-direction:column; gap:10px; margin-bottom:22px; }
.check-row{
  display:flex; align-items:flex-start; gap:12px; padding:14px 16px; border:1.5px solid var(--line);
  border-radius:var(--radius-sm); background:var(--white);
}
.check-icon{ font-size:1.1rem; flex:none; margin-top:1px; }
.check-body{ flex:1; }
.check-name{ font-weight:600; font-size:.92rem; }
.check-status{ font-size:.8rem; margin-top:2px; }
.check-status[data-c="have"]{ color:var(--teal-ink); }
.check-status[data-c="missing"]{ color:#7C3323; }
.check-status[data-c="expired"]{ color:#7A5314; }
.check-use{ font-size:.78rem; color:var(--ink-soft); margin-top:4px; }

.packet-list{ display:flex; flex-direction:column; gap:8px; margin-bottom:20px; }
.packet-item{
  display:flex; align-items:center; justify-content:space-between; padding:10px 14px;
  border:1px solid var(--line); border-radius:8px; background:var(--paper-2); font-size:.86rem;
}
.packet-actions button{ background:none; border:none; cursor:pointer; font-size:.78rem; font-weight:700; color:var(--ink-soft); padding:4px 8px;}
.packet-actions button:hover{ color:var(--coral); }

.action-split{ display:flex; gap:14px; flex-wrap:wrap; margin-top:8px; }
.confirm-box{
  border:1.5px solid var(--coral); background:var(--coral-bg); border-radius:var(--radius);
  padding:18px 20px; margin-top:16px;
}
.deleted-box{
  border:1.5px solid var(--teal); background:var(--teal-bg); border-radius:var(--radius);
  padding:18px 20px; margin-top:16px; display:flex; align-items:center; gap:10px; font-weight:600; color:var(--teal-ink);
}

/* trust panel */
.overlay{
  position:fixed; inset:0; background:rgba(28,43,58,.35); z-index:100; opacity:0; pointer-events:none;
  transition:opacity var(--dur) var(--ease);
}
.overlay.open{ opacity:1; pointer-events:auto; }
.trust-panel{
  position:fixed; inset-block:0; inset-inline-end:0; width:min(400px,92vw); background:var(--white);
  z-index:101; box-shadow:-8px 0 30px rgba(0,0,0,.15); padding:26px; overflow-y:auto;
  transform:translateX(105%); transition:transform var(--dur) var(--ease);
}
html[dir="rtl"] .trust-panel{ transform:translateX(-105%); }
.trust-panel.open{ transform:translateX(0); }
.trust-item{ display:flex; gap:12px; padding:14px 0; border-bottom:1px solid var(--line); }
.trust-item:last-child{ border-bottom:none; }
.trust-item svg{ flex:none; margin-top:2px; color:var(--teal); }
.trust-item h3{ font-size:.92rem; margin-bottom:3px; }
.trust-item p{ font-size:.83rem; color:var(--ink-soft); margin:0; }
.close-x{ background:none; border:none; cursor:pointer; font-size:1.3rem; color:var(--ink-soft); line-height:1;}

/* dev / judge test rail */
.judge-bar{
  border:1.5px dashed var(--line-strong); border-radius:var(--radius); padding:16px 18px; margin-top:26px;
  background:repeating-linear-gradient(135deg, var(--paper-2), var(--paper-2) 10px, var(--paper) 10px, var(--paper) 20px);
}
.judge-bar h2{ font-size:.85rem; text-transform:uppercase; letter-spacing:.06em; margin-bottom:10px; }
.judge-btns{ display:flex; gap:10px; flex-wrap:wrap; }
.test-result{
  margin-top:12px; font-size:.86rem; padding:12px 14px; border-radius:10px; border:1.5px solid; display:none;
}
.test-result.show{ display:block; animation:rise var(--dur) var(--ease); }
.test-result.pass{ border-color:var(--teal); background:var(--teal-bg); color:var(--teal-ink); }

footer.foot{ text-align:center; color:var(--ink-soft); font-size:.78rem; margin-top:40px; }
.sr-announce{ position:absolute; width:1px;height:1px; overflow:hidden; }

/* ============ FLOATING CHAT WIDGET ============ */
.chat-fab{
  position:fixed; inset-block-end:22px; inset-inline-end:22px; z-index:90;
  background:var(--ink); color:var(--paper); border:none; border-radius:999px;
  padding:12px 18px; display:inline-flex; align-items:center; gap:8px;
  font-family:var(--font-body); font-weight:600; font-size:.88rem; cursor:pointer;
  box-shadow:0 10px 28px rgba(28,43,58,.28);
}
.chat-fab:hover{ background:var(--teal-ink); }
.chat-widget{
  position:fixed; inset-block-end:22px; inset-inline-end:22px; z-index:95;
  width:min(400px, 94vw); max-height:min(640px, 84vh);
  background:var(--paper); border:1px solid var(--line-strong); border-radius:var(--radius);
  box-shadow:0 18px 44px rgba(28,43,58,.22);
  display:flex; flex-direction:column; overflow:hidden;
}
.chat-head{
  background:var(--ink); color:var(--paper); padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between; gap:10px;
}
.chat-head h2{ font-family:var(--font-display); font-size:1rem; color:var(--paper); margin:0; }
.chat-head .chat-sub{ font-size:.72rem; color:#C9D1D8; margin-top:2px; }
.chat-head .close-x{ color:var(--paper); }
.chat-body{
  flex:1; overflow-y:auto; padding:14px 16px; display:flex; flex-direction:column; gap:12px;
  background:var(--paper);
}
.chat-empty{ font-size:.82rem; color:var(--ink-soft); }
.chat-foot{
  border-top:1px solid var(--line); padding:12px; background:var(--white);
  display:flex; flex-direction:column; gap:8px;
}
.chat-foot .chip-row{ margin:0; }
.chat-foot .ask-row{ margin:0; }
.chat-widget .qa-pair{ display:flex; flex-direction:column; gap:6px; }
.chat-widget .answer-card{ margin-top:0; padding:14px 16px; }
.chat-widget .answer-row{ font-size:.84rem; }
.chat-widget .comparison-line{ font-size:1rem; }
</style>
</head>
<body>
<a href="#main" class="skip-link" data-i18n="skip">Skip to main content</a>
<div id="app"></div>
<div class="sr-announce" id="live" role="status" aria-live="polite"></div>

<script>
const SESS_ID = localStorage.getItem('session_id') || 'sess_' + Math.random().toString(36).substr(2, 9);
localStorage.setItem('session_id', SESS_ID);

function t(key, vars){
  let s = T[S.lang][key] ?? T.en[key] ?? key;
  if(vars) Object.keys(vars).forEach(k=> s = s.replaceAll(`{${k}}`, vars[k]));
  return s;
}

function render(){

}

function Rail(){
  const steps = [
    {n:1,label:t('step1Label'),desc:t('step1Desc')},
    {n:2,label:t('step2Label'),desc:t('step2Desc')},
    {n:3,label:t('step3Label'),desc:t('step3Desc')},
  ];
  return `
  <nav class="rail" aria-label="Progress">
    ${steps.map(st=>{
      const done = S.step > st.n;
      const current = S.step === st.n;
      return `<button class="stub" data-action="goto-step" data-step="${st.n}" aria-current="${current?'step':'false'}" data-done="${done}">
        ${current ? `<span class="plane" aria-hidden="true">✈️</span>`:''}
        <span class="stub-row">
          <span class="stub-num" aria-hidden="true">${done?'':st.n}</span>
          <span class="stub-label">${st.label}</span>
        </span>
        <span class="stub-desc">${st.desc}</span>
      </button>`;
    }).join('')}
  </nav>`;
}

function tagIcon(c){ return c==='confident'?'✓':c==='check'?'!':'?'; }
function fmtValue(k,v){

}

function computeChecklist(){
  const f = S.fields;
  const list = [
    { key:'paystub', name:t('docPaystub'), use:t('docPaystubUse'),
      status: (f.income.confirmed && S.uploadedDocTypes.includes('pay_stub')) ? 'have' : 'missing' },
    { key:'stipend', name:t('docStipend'), use:t('docStipendUse'),
      status: (f.employer.confirmed && (S.uploadedDocTypes.includes('employment_letter') || S.uploadedDocTypes.includes('benefit_letter'))) ? 'have' : 'missing' },
    { key:'summary', name:t('docSummary'), use:t('docSummaryUse'),
      status: (f.household.confirmed && S.uploadedDocTypes.includes('application_summary')) ? 'have' : 'missing' },
  ];
  // enroll: derived from docdate
  const v = f.docdate.value;
  let enrollStatus = 'missing';
  if(v){
    const dt = new Date(v);
    if(!isNaN(dt.getTime())){
      const cutoff = new Date('2026-07-18');
      cutoff.setDate(cutoff.getDate() - 60);
      const eventDate = new Date('2026-07-18');
      enrollStatus = (dt < cutoff || dt > eventDate) ? 'expired' : 'have';
    }
  }
  list.push({ key:'enroll', name:t('docEnroll'), use:t('docEnrollUse'), status: enrollStatus });
  return list;
}

}

/* ================= EVENTS ================= */
function wireEvents(){
  const app = document.getElementById('app');
  app.addEventListener('click', onClick);
  app.addEventListener('keydown', onKeydown);
  app.addEventListener('change', onChange);
  app.addEventListener('dragover', onDragOver);
  app.addEventListener('dragleave', onDragLeave);
  app.addEventListener('drop', onDrop);
  const ask = document.getElementById('ask-input');
  if(ask) ask.addEventListener('keydown', e=>{ if(e.key==='Enter'){ e.preventDefault(); doAsk('typed'); } });
}

function onKeydown(e){
  if(e.key==='Escape' && S.trustOpen){ S.trustOpen=false; render(); }
}

function onChange(e){
  const el = e.target.closest('[data-action="input-field"]');
  if(el){ S.fields[el.dataset.field].value = el.value; return; }
  if(e.target && e.target.id === 'file-input'){
    const files = Array.from(e.target.files || []);
    addSelectedFiles(files);
    e.target.value = '';
  }
}

/* ================= FILE UPLOAD ================= */
const ACCEPTED_EXT = ['pdf','jpg','jpeg','png'];
const ACCEPTED_MIME = ['application/pdf','image/jpeg','image/png','image/jpg'];
function fileAccepted(f){
  const ext = (f.name.split('.').pop()||'').toLowerCase();
  return ACCEPTED_EXT.includes(ext) || ACCEPTED_MIME.includes((f.type||'').toLowerCase());
}
function addSelectedFiles(files){
  const ok = files.filter(fileAccepted).map(f=>({ name:f.name, size:f.size, type:f.type, _file:f }));
  if(!ok.length) return;
  S.selectedFiles = S.selectedFiles.concat(ok);
  render();
}
async function openFilePicker(){
  if(window.showOpenFilePicker){
    try{
      const handles = await window.showOpenFilePicker({
        multiple:true,
        types:[{ description:'Documents', accept:{ 'application/pdf':['.pdf'], 'image/jpeg':['.jpg','.jpeg'], 'image/png':['.png'] } }]
      });
      const files = await Promise.all(handles.map(h=>h.getFile()));
      addSelectedFiles(files);
      return;
    }catch(err){ if(err && err.name==='AbortError') return; /* fall through */ }
  }
  document.getElementById('file-input')?.click();
}
async function processSelectedFiles() {
  for (const f of S.selectedFiles) {
    if (f._file) {
      const formData = new FormData();
      formData.append("file", f._file);
      try {
        const res = await fetch(`${API_BASE}/upload`, { method: "POST", headers: { "X-Session-ID": SESS_ID }, body: formData });
        if (!res.ok) {
          const errText = await res.text();
          alert("Backend /upload error: " + errText);
          continue;
        }
        const data = await res.json();
        if (data.extracted_data) {
          const ex = data.extracted_data;
          if (ex.document_type && !S.uploadedDocTypes.includes(ex.document_type)) {
            S.uploadedDocTypes.push(ex.document_type);
          }
          let gross_pay = "";
          let pay_period = "";
          
          if (ex.gross_pay) gross_pay = ex.gross_pay.value;
          if (ex.pay_period) pay_period = ex.pay_period.value;
          if (ex.employer_name) {
            S.fields.employer.value = ex.employer_name.value;
            S.fields.employer.confidence = ex.employer_name.confidence_score > 0.8 ? 'confident' : 'check';
          }
          if (ex.date_issued) {
            S.fields.docdate.value = ex.date_issued.value;
            S.fields.docdate.confidence = ex.date_issued.confidence_score > 0.8 ? 'confident' : 'check';
          }
          if (ex.household_size) {
            S.fields.household.value = ex.household_size.value;
            S.fields.household.confidence = ex.household_size.confidence_score > 0.8 ? 'confident' : 'check';
          }
          
          // Call validate_profile to get annualized income
          if (gross_pay && pay_period) {
             const vRes = await fetch(`${API_BASE}/validate_profile`, {
               method: "POST",
               headers: { "Content-Type": "application/json", "X-Session-ID": SESS_ID },
               body: JSON.stringify({
                 gross_pay: gross_pay,
                 pay_period: pay_period,
                 household_size: String(S.fields.household.value || 1)
               })
             });
             if(vRes.ok) {
                 const vData = await vRes.json();
                 S.fields.income.value = vData.annualized_income;
                 if (vData.household_size) S.fields.household.value = vData.household_size;
                 S.fields.income.confidence = 'confident';
             } else {
                 const errText = await vRes.text();
                 alert("Backend /validate_profile error: " + errText);
             }
          } else {
             console.warn("Missing gross_pay or pay_period in extraction (normal for non-paystubs): gross_pay=" + gross_pay + ", pay_period=" + pay_period);
          }
        }
        
        // Handle injection
        if (data.trickCaught || S.trickUpload) {
          S.trickCaught = true;
        }
      } catch (e) {
        console.error("Upload error", e);
        alert("Frontend fetch error: " + e.message);
      }
    } else {
      await new Promise(r => setTimeout(r, 300));
    }
  }
}
function fmtSize(b){
  if(b==null) return '';
  if(b < 1024) return b+' B';
  if(b < 1024*1024) return (b/1024).toFixed(1)+' KB';
  return (b/1024/1024).toFixed(2)+' MB';
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}
function onDragOver(e){
  if(!e.target.closest('.dropzone')) return;
  e.preventDefault();
  e.target.closest('.dropzone').style.borderColor = 'var(--teal)';
  e.target.closest('.dropzone').style.background = 'var(--teal-bg)';
}
function onDragLeave(e){
  const dz = e.target.closest('.dropzone');
  if(!dz) return;
  dz.style.borderColor = '';
  dz.style.background = '';
}
function onDrop(e){
  const dz = e.target.closest('.dropzone');
  if(!dz) return;
  e.preventDefault();
  dz.style.borderColor = ''; dz.style.background = '';
  S.trickUpload = false;
  const files = Array.from(e.dataTransfer?.files || []);
  addSelectedFiles(files);
}

function onClick(e){
  const el = e.target.closest('[data-action]');
  if(!el) return;
  const a = el.dataset.action;

  if(a==='lang'){ S.lang = el.dataset.lang; render(); return; }
  if(a==='toggle-trust'){ S.trustOpen = !S.trustOpen; render(); document.querySelector('.shield-btn')?.focus(); return; }
  if(a==='close-trust'){ S.trustOpen = false; render(); document.querySelector('.shield-btn')?.focus(); return; }
  if(a==='toggle-chat'){ S.chatOpen = !S.chatOpen; render();
    if(S.chatOpen) setTimeout(()=>document.getElementById('ask-input')?.focus(), 30);
    return; }

  if(a==='goto-step'){
    const n = Number(el.dataset.step);
    if(n===1 || S.uploaded){ S.step = n; render(); announce(t('announceStep',{step:el.querySelector('.stub-label').textContent})); }
    return;
  }

  if(a==='pick-files'){
    S.trickUpload = el.dataset.trick==='true';
    openFilePicker();
    return;
  }

  if(a==='clear-files'){
    S.selectedFiles = [];
    render();
    return;
  }

  if(a==='process-files'){
    if(!S.selectedFiles.length) return;
    S.processing = true; render();
    processSelectedFiles().then(()=>{
      S.processing = false;
      S.uploaded = true;
      if(S.trickUpload) S.trickCaught = true;
      render();
    });
    return;
  }

  if(a==='toggle-help'){ const f = S.fields[el.dataset.field]; f.showHelp = !f.showHelp; render(); return; }
  if(a==='edit-field'){ const f = S.fields[el.dataset.field]; f.editing = true; f.confirmed=false; render();
    document.getElementById('input-'+el.dataset.field)?.focus(); return; }
  if(a==='save-field'){
    const k = el.dataset.field, f = S.fields[k];
    const inp = document.getElementById('input-'+k);
    if(inp) f.value = k==='household' ? Number(inp.value)||f.value : inp.value;
    f.editing = false; f.confidence='confident'; render(); return;
  }
  if(a==='confirm-field'){
    const f = S.fields[el.dataset.field]; f.confirmed = true; render();
    announce(fieldLabel(el.dataset.field)+' '+t('confirmed')); return;
  }
  if(a==='fix-field'){ S.step = 1; S.fields[el.dataset.field].editing = true; render();
    setTimeout(()=>document.getElementById('input-'+el.dataset.field)?.focus(),60); return; }

  if(a==='go-step2'){ S.step = 2; render(); announce(t('announceStep',{step:t('step2Label')})); return; }

  if(a==='ask'){ doAsk(el.dataset.q); return; }
  if(a==='ask-typed'){ doAsk('typed'); return; }

  if(a==='remove-packet'){ S.packet = S.packet.filter(k=>k!==el.dataset.key); render(); return; }
  if(a==='download'){
    S.downloaded = true; render();
    triggerDownload();
    return;
  }
  if(a==='ask-delete'){ S.deleteConfirmOpen = true; render(); return; }
  if(a==='cancel-delete'){ S.deleteConfirmOpen = false; render(); return; }
  if(a==='confirm-delete'){
    S.deleted = true; S.deleteConfirmOpen = false; S.uploaded=false;
    S.testResults.del = true;
    S.uploadedDocTypes = [];
    render(); announce(t('announceDeleted'));
    fetch(`${API_BASE}/session`, { method: "DELETE", headers: { "X-Session-ID": SESS_ID } }).catch(console.error);
    return;
  }

  if(a==='test-refusal'){ S.testResults.refusal = true; S.chatOpen = true; render();
    doAsk('qualify'); return; }
  if(a==='test-trick'){ S.testResults.trick = true; S.step=1; S.uploaded=false;
    S.trickUpload = true;
    S.selectedFiles = [{ name:'suspicious-paystub.pdf', size: 184320, type:'application/pdf' }];
    render();
    document.querySelector('[data-action="process-files"]')?.click(); return; }
  if(a==='test-delete'){ S.step=3; render(); document.querySelector('[data-action="ask-delete"]')?.click(); return; }
}

async function doAsk(kind){
  const qText = kind==='typed' ? (document.getElementById('ask-input')?.value || '').trim() :
    kind==='limit' ? t('chip1') : kind==='formula' ? t('chip2') : t('chip3');
  if(!qText) return;
  
  const entryKind = kind==='qualify' ? 'redirect' : 'evidence';
  const entry = { q: qText, kind: entryKind, loading: true };
  S.qaLog.push(entry);
  S.answer = entryKind;
  S.chatOpen = true;
  render();
  
  if (kind !== 'qualify') {
      try {
          const res = await fetch(`${API_BASE}/understand`, {
              method: "POST",
              headers: { "Content-Type": "application/json", "X-Session-ID": SESS_ID },
              body: JSON.stringify({
                  annualized_income: Number(S.fields.income.value) || 0,
                  household_size: Number(S.fields.household.value) || 1,
                  question: qText
              })
          });
          if (res.ok) {
              const data = await res.json();
              entry.explanation = data.explanation;
              entry.loading = false;
              render();
          }
      } catch (e) {
          console.error(e);
          entry.loading = false;
      }
  } else {
      // Refusal test handles redirect automatically in UI
      entry.loading = false;
      render();
  }
  
  requestAnimationFrame(()=>{
    const body = document.getElementById('chat-body');
    if(body){
      const pairs = body.querySelectorAll('.qa-pair');
      const last = pairs[pairs.length-1];
      if(last) last.scrollIntoView({behavior:'smooth', block:'end'});
      else body.scrollTop = body.scrollHeight;
    }
  });
  const inp = document.getElementById('ask-input'); if(inp){ inp.value=''; inp.focus(); }
}

async function triggerDownload(){
  const payload = {
    profile_data: {
      annualized_income: Number(S.fields.income.value) || 0,
      household_size: Number(S.fields.household.value) || 1
    },
    rule_data: {
      threshold: LIMITS[S.fields.household.value] || LIMITS[3],
      comparison: (Number(S.fields.income.value) <= (LIMITS[S.fields.household.value] || LIMITS[3])) ? "below_or_equal" : "above",
      rule_cited: { rule_id: "HUD-MTSP-002" }
    },
    readiness_data: {
      status: computeChecklist().every(d=>d.status==='have') ? "READY_TO_REVIEW" : "NEEDS_REVIEW",
      missing_documents: computeChecklist().filter(d=>d.status==='missing').map(d=>d.key),
      expired_documents: computeChecklist().filter(d=>d.status==='expired').map(d=>d.key)
    }
  };

  try {
    const res = await fetch(`${API_BASE}/export`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "X-Session-ID": SESS_ID },
      body: JSON.stringify(payload)
    });
    if (res.ok) {
      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'realdoor_application_packet.txt'; document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
    }
  } catch(e) {
    console.error(e);
  }
}

render();
</script>
